name: Collect traffic data

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and save traffic data for all repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OWNER=$(gh api user --jq '.login')

          gh api "/users/${OWNER}/repos" --paginate --jq '.[].name' | head -3 | while read -r REPO; do
            LETTER=$(echo "${REPO:0:1}" | tr '[:upper:]' '[:lower:]')
            OUTPUT_DIR=".github/data/${LETTER}/${REPO}/traffic"
            OUTPUT_FILE="${OUTPUT_DIR}/traffic-${DATE}.json"

            mkdir -p "$OUTPUT_DIR"

            RESPONSE=$(gh api "/repos/${OWNER}/${REPO}/traffic/views" 2>/dev/null) || continue

            echo "$RESPONSE" \
              | jq --arg repo "$REPO" --arg date "$DATE" '. + {repo: $repo, collected_at: $date}' \
              > "$OUTPUT_FILE"

            echo "Saved: $OUTPUT_FILE"
          done

      - name: Commit traffic data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(date -u +%Y-%m-%d)

          git add .github/data/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: collect traffic data for ${DATE}"
            git push
          fi