name: Collect traffic data

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch traffic data for all repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OWNER=$(gh api user --jq '.login')

          gh api "/users/${OWNER}/repos" --paginate --jq '.[].name' | head -3 | while read -r REPO; do
            LETTER=$(echo "${REPO:0:1}" | tr '[:upper:]' '[:lower:]')
            BASE_DIR=".github/data/repos/${LETTER}/${REPO}"

            mkdir -p "${BASE_DIR}/traffic" "${BASE_DIR}/referrers" "${BASE_DIR}/info"

            # views
            gh api "/repos/${OWNER}/${REPO}/traffic/views" 2>/dev/null \
              | jq --arg repo "$REPO" --arg date "$DATE" '. + {repo: $repo, collected_at: $date}' \
              > "${BASE_DIR}/traffic/views-${DATE}.json" || true

            # referrers (sources)
            gh api "/repos/${OWNER}/${REPO}/traffic/popular/referrers" 2>/dev/null \
              > "${BASE_DIR}/referrers/referrers-${DATE}.json" || echo '[]' > "${BASE_DIR}/referrers/referrers-${DATE}.json"

            # repo info (stars, default branch)
            gh api "/repos/${OWNER}/${REPO}" 2>/dev/null \
              | jq '{stars: .stargazers_count, default_branch: .default_branch}' \
              > "${BASE_DIR}/info/info-${DATE}.json" || echo '{"stars":0,"default_branch":"main"}' > "${BASE_DIR}/info/info-${DATE}.json"

            echo "Saved: ${BASE_DIR}"
          done

      - name: Generate aggregate and charts
        run: |
          node .github/scripts/generate-aggregate.js
          node .github/scripts/generate-charts.js

      - name: Commit data and charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(date -u +%Y-%m-%d)

          git add .github/data/ .github/charts/ README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: collect traffic data for ${DATE}"
            git push
          fi
